<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alicia's Sweet Treats - Contact</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo">
            <img src="logo-kue.png" alt="Logo Kue" class="logo-img">
            <span class="logo-text">Alicia’s Sweet Treats</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="daftarmenu.html">Menu</a>
            <a href="profil.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </div>
    </nav>
    
    <main class="main-container">
        
        <img src="pita_kiri.png" class="ornamen pita-kiri" alt="Pita Kiri">
        <img src="pita_kanan.png" class="ornamen pita-kanan" alt="Pita Kanan">
        <img src="ceri-pink.png" class="ornamen ceri" alt="Ceri">
        <img src="bunga.png" class="ornamen bunga-pink" alt="Bunga Pink">
        <img src="kelinci-comel.png" class="ornamen kelinci" alt="Kelinci">
        <img src="bunga_bawah.png" class="ornamen bunga-bawah" alt="Bunga Bawah">

        <div class="contact-container">
            
            <div class="contact-info">
                <h2 class="contact-subtitle">Yuk, Sapa Kami! 🍰</h2>
                <p class="contact-desc">Ada pertanyaan seputar bento cake custom atau mau order untuk acara besar? Hubungi kami lewat kontak di bawah ya!</p>
                
                <div class="info-links">
                    <div class="info-item">
                        <span class="info-label">✨ Instagram</span>
                        <strong>@alicias.sweettreats</strong>
                    </div>
                    <div class="info-item">
                        <span class="info-label">🟢 WhatsApp</span>
                        <strong>0812-3456-7890</strong>
                    </div>
                    <div class="info-item">
                        <span class="info-label">📍 Alamat Toko</span>
                        <strong>Jl. Manis Selalu No. 41</strong>
                    </div>
                </div>
            </div>
            
            <div class="contact-form-box">
                <h2 class="contact-subtitle">Kirim Pesan ✉️</h2>
                <form action="#" class="message-form">
                    <div class="form-group-contact">
                        <label for="c-nama">Nama Lengkap:</label>
                        <input type="text" id="c-nama" placeholder="Nama kamu..." class="contact-input" required>
                    </div>
                        
                    <div class="form-group-contact">
                        <label for="c-email">Email:</label>
                        <input type="email" id="c-email" placeholder="Email kamu..." class="contact-input" required>
                    </div>

                    <div class="form-group-contact">
                        <label for="c-pesan">Pesan / Pertanyaan:</label>
                        <textarea id="c-pesan" rows="4" placeholder="Tulis sesuatu untuk Alicia..." class="contact-input" required></textarea>
                    </div>
                    <button type="submit" class="kirim-pesan">Kirim Pesan ✨</button>
                </form>
            </div>
            
        </div>     

        <div class="pembatas-bawah"></div>
    </main>
</body>
</html>
